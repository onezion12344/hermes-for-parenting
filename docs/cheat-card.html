<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跟13歲女兒相處 · 隨身小卡</title>
<style>
  :root {
    --bg: #fef9ef; --card-bg: #fff; --text: #3d3d3d;
    --accent: #e8a850; --pink: #e8a0a0; --green: #6a9b7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang HK", "Noto Sans HK", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.7; padding: 20px; max-width: 500px; margin: 0 auto;
  }

  /* ── 卡片本體 ── */
  .card {
    background: #fffdf7;
    border: 2px solid #e8d5b0;
    border-radius: 20px;
    padding: 28px 22px;
    margin: 10px 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute;
    top: 0; left: 0; width: 100%; height: 5px;
    background: linear-gradient(90deg, var(--accent), var(--pink), var(--green));
  }

  h1 {
    text-align: center; font-size: 1.3em; color: #c0783a;
    margin-bottom: 4px;
  }
  .sub {
    text-align: center; font-size: 0.8em; color: #bbb; margin-bottom: 18px;
  }

  /* ── 三大轉變 ── */
  .three-shifts {
    display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px;
  }
  .shift {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.95em;
  }
  .shift .old {
    color: #c88; text-decoration: line-through; min-width: 70px; text-align: right;
  }
  .shift .arrow { color: #ccc; font-size: 0.9em; }
  .shift .new {
    color: var(--green); font-weight: 600;
  }

  /* ── 三個場景 ── */
  .divider {
    text-align: center; color: #ddd; font-size: 0.8em; margin: 14px 0 10px;
    letter-spacing: 4px;
  }
  .scenario {
    background: #fdf8f0; border-radius: 12px; padding: 12px 14px;
    margin: 8px 0; font-size: 0.9em;
  }
  .scenario .trigger { color: #c0783a; font-weight: 600; margin-bottom: 2px; }
  .scenario .say { color: var(--green); }

  /* ── 口訣 ── */
  .mantra {
    background: linear-gradient(135deg, #fff8e1, #ffe0b2);
    border-radius: 14px; padding: 16px; text-align: center;
    margin: 16px 0;
  }
  .mantra .big { font-size: 1.3em; font-weight: 700; color: #c0783a; }
  .mantra .small { font-size: 0.85em; color: #888; margin-top: 4px; }

  /* ── 底句 ── */
  .bottom-line {
    text-align: center; font-size: 0.95em; color: #666;
    margin-top: 12px; font-style: italic;
  }
  .footer {
    text-align: center; color: #ccc; font-size: 0.7em; margin-top: 20px;
  }

  /* ── 打印優化 ── */
  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
    .footer { display: none; }
  }
</style>
</head>
<body>

<div class="card">
  <h1>🐑 跟 13 歲女兒相處</h1>
  <p class="sub">隨身小卡 · 緊張時望一眼</p>

  <!-- 三大轉變 -->
  <div class="three-shifts">
    <div class="shift">
      <span class="old">做法官</span>
      <span class="arrow">→</span>
      <span class="new">做隊友</span>
    </div>
    <div class="shift">
      <span class="old">命令</span>
      <span class="arrow">→</span>
      <span class="new">商量</span>
    </div>
    <div class="shift">
      <span class="old">檢查</span>
      <span class="arrow">→</span>
      <span class="new">好奇</span>
    </div>
  </div>

  <!-- 三個場景一句話 -->
  <div class="divider">⋯ 常見場景 · 一句話 ⋯</div>

  <div class="scenario">
    <div class="trigger">😤 她黑面不理你</div>
    <div class="say">「你而家唔想講嘢，OK。我等你想講先。」</div>
  </div>
  <div class="scenario">
    <div class="trigger">😰 她做錯事</div>
    <div class="say">先講「有冇整親？」再理事。</div>
  </div>
  <div class="scenario">
    <div class="trigger">🙅 她說「唔想」</div>
    <div class="say">「你覺得點樣比較好？」</div>
  </div>

  <!-- 口訣 -->
  <div class="mantra">
    <div class="big">先問 → 後聽 → 再商量</div>
    <div class="small">不要一開口就判斷</div>
  </div>

  <!-- 黃金法則 -->
  <div class="bottom-line">
    💛 你想她怎樣對你，你先怎樣對她。
  </div>

  <div class="footer">
    黃羊 Yellow Sheep · hermes-for-parenting
  </div>
</div>

</body>
</html>
