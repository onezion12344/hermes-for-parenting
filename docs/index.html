<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐑 黄羊育儿经 — 开明家长的智慧工具箱</title>
    <style>
        :root {
            --bg: #fffaf5;
            --card-bg: #ffffff;
            --text: #3d3027;
            --text-light: #7a6e63;
            --accent: #e8927c;
            --accent-soft: #fdf0eb;
            --border: #f0e3d8;
            --shadow: 0 2px 12px rgba(61, 48, 39, 0.06);
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }

        header {
            text-align: center;
            padding: 40px 0 32px;
        }
        header .icon { font-size: 56px; margin-bottom: 12px; }
        header h1 { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
        header p { color: var(--text-light); font-size: 15px; margin-top: 6px; }

        .topic-list { display: flex; flex-direction: column; gap: 14px; }
        .topic-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            text-decoration: none;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: transform 0.15s, box-shadow 0.15s;
            display: block;
        }
        .topic-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(61,48,39,0.10); }
        .topic-card .date { font-size: 12px; color: var(--text-light); }
        .topic-card h2 { font-size: 19px; margin: 6px 0 8px; font-weight: 600; color: #4a3729; }
        .topic-card .preview { font-size: 14px; color: var(--text-light); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .topic-card .tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
        .topic-card .tag { background: var(--accent-soft); color: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 12px; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state .emoji { font-size: 48px; }
        .empty-state h3 { margin: 16px 0 8px; font-size: 18px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="icon">🐑</div>
        <h1>黄羊育儿经</h1>
        <p>开明家长的智慧工具箱 · 用研究说话，用爱心陪伴</p>
    </header>
    <div class="topic-list" id="topicList">
        <div class="empty-state">
            <div class="emoji">🌱</div>
            <h3>育儿问答即将上线</h3>
            <p>把您遇到的教育难题告诉黄羊，<br>我会帮您研究、拆解，生成专属的育儿指南。</p>
        </div>
    </div>
</div>
<script>
// Dynamic topic list from topics.json
fetch('topics.json')
  .then(r => r.json())
  .then(topics => {
    if (!topics.length) return;
    document.getElementById('topicList').innerHTML = topics.map(t => `
      <a href="${t.id}/" class="topic-card">
        <div class="date">${t.date}</div>
        <h2>${t.title}</h2>
        <div class="preview">${t.summary}</div>
        <div class="tags">${(t.tags||[]).map(tg => `<span class="tag">${tg}</span>`).join('')}</div>
      </a>
    `).join('');
  });
</script>
</body>
</html>
